version: "3.9"

volumes:
  db-data:

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn orchestrator.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - db-data:/data
    depends_on: []

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn dashboard.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - db-data:/data
    depends_on:
      - orchestrator
